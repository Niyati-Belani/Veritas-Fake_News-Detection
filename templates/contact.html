<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Veritas | Neural Stream Scanner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet" />
</head>
<body>
    <nav class="top-nav">
        <a href="/scanner" class="veritas-brand-link">
            <div class="veritas-logo-mark">
                <div class="veritas-fluid-node"></div>
            </div>
            <span class="veritas-title-string">Veritas</span>
            <span class="veritas-core-badge">Core Engine</span>
        </a>
        <div class="nav-links">
            <a href="/guide">Guide</a>
            <a href="/scanner">Scanner</a>
            <a href="/analytics">Metrics</a>
            <a href="/about">About</a>
            <a href="/contact" class="active">Contact</a>
            <a href="/profile" class="nav-profile-icon" title="Operative Dossier">
                <span class="material-symbols-outlined">account_circle</span>
            </a>
            <a href="/logout" class="btn-nav-auth">Logout</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="panel auth-panel" style="max-width: 600px; position: relative; padding: 60px 50px;">
            <div style="position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--primary);"></div>
            
            <div style="text-align: center; margin-bottom: 40px;">
                <span class="material-symbols-outlined" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 10px;">mail</span>
                <h2 style="font-size: 1.8rem; letter-spacing: 2px;">[ SECURE DISPATCH ]</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">Contact the administration team for API access, system errors, or dataset submissions.</p>
            </div>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div style="background: rgba(0, 255, 170, 0.1); color: #00ffaa; border: 1px solid rgba(0, 255, 170, 0.3); padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 25px; font-family: monospace; letter-spacing: 1px; font-size: 0.9rem;">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}
            
            <form action="/contact" method="POST">
                <div class="form-group" style="margin-bottom: 25px;">
                    <label style="display: block; font-size: 0.75rem; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px;">[ INQUIRY SUBJECT ]</label>
                    <input type="text" name="subject" required style="width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: white; padding: 12px 0; font-size: 1.1rem; outline: none; transition: 0.3s;" onfocus="this.style.borderBottomColor='var(--primary)'" onblur="this.style.borderBottomColor='var(--border)'">
                </div>
                <div class="form-group" style="margin-bottom: 40px;">
                    <label style="display: block; font-size: 0.75rem; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px;">[ MESSAGE CONTENT ]</label>
                    <textarea name="message" required style="width: 100%; height: 100px; background: transparent; border: none; border-bottom: 1px solid var(--border); color: white; padding: 12px 0; font-size: 1.1rem; outline: none; transition: 0.3s; resize: vertical;" onfocus="this.style.borderBottomColor='var(--primary)'" onblur="this.style.borderBottomColor='var(--border)'"></textarea>
                </div>
                <button type="submit" class="btn-submit" style="width: 100%; text-transform: uppercase; letter-spacing: 2px;">Transmit Message <span class="arrow">→</span></button>
            </form>
        </div>
    </div>
</body>
</html>
